<script>
    // Replace these with your own image file names.
    // Make sure these images are uploaded to the same GitHub repository.
    const myPhotos = [
        "00000200-PHOTO-2026-05-02-12-20-21.jpg",
        "14422f61-4056-4c27-88c5-0a8975661eb7.JPG",
        "ed82eb27-3620-4bb6-b787-ba7f526adab6.JPG"
    ];

    let currentPhotoIndex = 0;
    let revealedHeartsCount = 0;

    function navigate(from, to) {
        document.getElementById(from).classList.remove("active");
        document.getElementById(to).classList.add("active");
    }

    function startMeasuring() {
        navigate("page1", "page2");

        let count = 0;
        const fill = document.getElementById("meterFill");
        const txt = document.getElementById("percentage");

        const interval = setInterval(() => {
            count += 2;

            if (count <= 100) {
                fill.style.width = count + "%";
            } else {
                fill.style.width = "100%";
            }

            txt.innerText = count + "%";

            if (count >= 120) {
                clearInterval(interval);

                setTimeout(() => {
                    navigate("page2", "page3");
                }, 800);
            }
        }, 30);
    }

    function revealHeart(element) {
        const textNode = element.querySelector(".heart-text");

        if (textNode.style.display !== "block") {
            textNode.style.display = "block";
            element.querySelector(".heart-emoji").style.transform = "scale(1.2)";
            revealedHeartsCount++;

            if (revealedHeartsCount === 3) {
                document.getElementById("seeMoreBtn").style.display = "inline-block";
            }
        }
    }

    function goToPhotos() {
        const img = document.getElementById("galleryImg");
        img.src = myPhotos[currentPhotoIndex];
        navigate("page3", "page4");
    }

    function nextPhoto() {
        currentPhotoIndex = (currentPhotoIndex + 1) % myPhotos.length;
        document.getElementById("galleryImg").src = myPhotos[currentPhotoIndex];
    }

    // Optional: if an image fails to load, show a placeholder.
    document.addEventListener("DOMContentLoaded", () => {
        const img = document.getElementById("galleryImg");

        img.onerror = function () {
            this.src = "https://via.placeholder.com/300x280?text=Photo+Not+Found";
        };
    });
</script>
